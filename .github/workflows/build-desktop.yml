name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows (.exe NSIS installer) ────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Install root project deps (sharp, ffmpeg-static, etc.)
      - name: Install root deps
        run: npm install --no-audit --prefer-offline

      # Install electron + electron-builder in the electron/ subdir
      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit

      - name: Build Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Explicitly disable code signing (no cert → build still succeeds)
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --win --x64 --publish never

      - name: List dist output
        working-directory: electron
        run: dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/*.exe
          if-no-files-found: error
          retention-days: 7

  # ── macOS (.dmg) ─────────────────────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root deps
        run: npm install --no-audit --prefer-offline

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''
          # Disable Gatekeeper hardened runtime (no Apple Developer cert)
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: 'true'
        run: npx electron-builder --mac --x64 --publish never

      - name: List dist output
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ── Linux (.AppImage + .deb) ──────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage + .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install system libs for electron-builder
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg \
            libnss3 libxss1 libxtst6 libx11-xcb1 \
            libxcb-dri3-0 libdrm2 libgbm1

      - name: Install root deps
        run: npm install --no-audit --prefer-offline

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux AppImage deb --publish never

      - name: List dist output
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: error
          retention-days: 7

  # ── Publish GitHub Release with all three installers ─────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      # Download all three artifacts into a flat directory
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## 🦁 Lavira Media Engine ${{ github.ref_name }}

            **AI-powered safari content engine — now as a desktop app.**
            No terminal, no Docker, no Node.js required. Just install and open.

            ---

            ### ⬇️ Download for your platform

            | Platform | Installer | Instructions |
            |---|---|---|
            | **Windows 10/11** | `Lavira-Media-Setup-*.exe` | Double-click → Next → Finish → opens from Desktop shortcut |
            | **macOS 12+** | `Lavira-Media-Setup-*.dmg` | Open DMG → drag **Lavira Media** to Applications → launch |
            | **Linux** | `Lavira-Media-Setup-*.AppImage` | `chmod +x *.AppImage` → double-click to run (no install needed) |
            | **Linux (Debian/Ubuntu)** | `Lavira-Media-Setup-*.deb` | `sudo dpkg -i *.deb` → find in app menu |

            ---

            ### 🔑 On first launch — Setup Wizard

            A one-time setup window opens and asks for your API keys:

            | Key | Required? | Where to get it |
            |---|---|---|
            | **Anthropic API key** | ✅ Required | [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) |
            | **Pexels API key** | Optional | [pexels.com/api](https://www.pexels.com/api/) — free |
            | **GIPHY API key** | Optional | [developers.giphy.com](https://developers.giphy.com/) — free |

            You can skip optional keys and add them later via the Settings panel in the app.

            ---

            ### 💡 What's inside

            - **52 AI-powered MCP tools** — generate branded posts, fetch stock media, publish to Instagram/TikTok/Facebook
            - **Lavira card templates** — 10 SVG designs across 3 visual families, Claude Vision–aware
            - **Bundled FFmpeg** — video/audio processing without any system install
            - **System tray** — runs quietly in the background, opens the full Web UI in-window
            - **MCP Server** on port 4006 — connect Claude Desktop to control the engine conversationally

            ---

            **Full docs:** [github.com/jaguar999paw-droid/lavira-media-engine](https://github.com/jaguar999paw-droid/lavira-media-engine)
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
