name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows (.exe NSIS installer) ────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: 'electron-builder'
        run: npx electron-builder --win --x64 --publish never

      - name: List dist
        working-directory: electron
        run: dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/*.exe
          if-no-files-found: error
          retention-days: 7

  # ── macOS (.dmg) ─────────────────────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''
          DEBUG: 'electron-builder'
        run: npx electron-builder --mac --x64 --publish never

      - name: List dist
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ── Linux (.AppImage + .deb) ──────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage + .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg \
            libnss3 libxss1 libxtst6 libx11-xcb1 \
            libxcb-dri3-0 libdrm2 libgbm1

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: 'electron-builder'
        run: npx electron-builder --linux AppImage deb --publish never

      - name: List dist
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: error
          retention-days: 7

  # ── Upload installers to Release (no body — windows-package.yml owns it) ─────
  upload-installers:
    name: Upload Installers to Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      # append_body: true — never overwrites the release description
      # windows-package.yml is the single source of truth for the release body
      - uses: softprops/action-gh-release@v2
        with:
          append_body: true
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
