name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows (.exe NSIS installer) ────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          DEBUG: 'electron-builder'
        run: npx electron-builder --win --x64 --publish never

      - name: List dist
        working-directory: electron
        run: dir dist

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/*.exe
          if-no-files-found: error
          retention-days: 7

  # ── macOS (.dmg) ─────────────────────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''
          DEBUG: 'electron-builder'
        run: npx electron-builder --mac --x64 --publish never

      - name: List dist
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error
          retention-days: 7

  # ── Linux (.AppImage + .deb) ──────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage + .deb)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg \
            libnss3 libxss1 libxtst6 libx11-xcb1 \
            libxcb-dri3-0 libdrm2 libgbm1

      - name: Install root deps
        run: npm install --no-audit --no-fund

      - name: Install electron deps
        working-directory: electron
        run: npm install --no-audit --no-fund

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEBUG: 'electron-builder'
        run: npx electron-builder --linux AppImage deb --publish never

      - name: List dist
        working-directory: electron
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: error
          retention-days: 7

  # ── Publish GitHub Release ────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: find release-assets -type f | sort

      - uses: softprops/action-gh-release@v2
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## 🦁 Lavira Media Engine ${{ github.ref_name }}

            **AI-powered safari content engine — now as a desktop app.**
            No terminal, no Docker, no Node.js required. Just install and open.

            ---

            ### ⬇️ Download for your platform

            | Platform | Installer | Instructions |
            |---|---|---|
            | **Windows 10/11** | `Lavira-Media-Setup-*.exe` | Double-click → Next → Finish → open from Desktop shortcut |
            | **macOS 12+** | `Lavira-Media-Setup-*.dmg` | Open DMG → drag **Lavira Media** to Applications → launch |
            | **Linux** | `Lavira-Media-Setup-*.AppImage` | `chmod +x *.AppImage` → double-click to run |
            | **Linux (deb)** | `Lavira-Media-Setup-*.deb` | `sudo dpkg -i *.deb` → find in app menu |

            ---

            ### 🔑 First launch — Setup Wizard

            A one-time setup window asks for your API keys:

            | Key | Required? | Get it at |
            |---|---|---|
            | **Anthropic API key** | ✅ Required | [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) |
            | **Pexels API key** | Optional (free) | [pexels.com/api](https://www.pexels.com/api/) |
            | **GIPHY API key** | Optional (free) | [developers.giphy.com](https://developers.giphy.com/) |

            ---

            ### 💡 What's inside

            - **52 AI-powered MCP tools** — branded posts, stock media, Instagram/TikTok/Facebook publishing
            - **Bundled FFmpeg** — no system install needed
            - **System tray** — runs in background, reopens with one click
            - **MCP Server on :4006** — connect Claude Desktop for conversational control

            **Full docs:** [github.com/jaguar999paw-droid/lavira-media-engine](https://github.com/jaguar999paw-droid/lavira-media-engine)
          files: release-assets/*
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
