name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Windows (.exe NSIS installer) ────────────────────────────────────────────
  build-windows:
    name: Windows (.exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install electron-builder
        working-directory: electron
        run: npm install

      - name: Build Windows installer
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WIN_CSC_LINK: ''
          WIN_CSC_KEY_PASSWORD: ''
        run: npx electron-builder --win --x64

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: electron/dist/*.exe
          if-no-files-found: error

  # ── macOS (.dmg) ──────────────────────────────────────────────────────────────
  build-mac:
    name: macOS (.dmg)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install root deps
        run: npm install

      - name: Install electron-builder
        working-directory: electron
        run: npm install

      - name: Build macOS DMG
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          CSC_LINK: ''
        run: npx electron-builder --mac --x64

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: electron/dist/*.dmg
          if-no-files-found: error

  # ── Linux (.AppImage + .deb) ──────────────────────────────────────────────────
  build-linux:
    name: Linux (.AppImage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libarchive-tools rpm fakeroot dpkg \
            libnss3 libxss1 libxtst6

      - name: Install root deps
        run: npm install

      - name: Install electron-builder
        working-directory: electron
        run: npm install

      - name: Build Linux packages
        working-directory: electron
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux

      - uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            electron/dist/*.AppImage
            electron/dist/*.deb
          if-no-files-found: error

  # ── Publish GitHub Release ────────────────────────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## Lavira Media Engine ${{ github.ref_name }}

            Download the installer for your platform below.

            | Platform | File | What to do |
            |---|---|---|
            | **Windows** | `Lavira-Media-Setup-*.exe` | Double-click → Next → Finish → open from Desktop |
            | **macOS** | `Lavira-Media-Setup-*.dmg` | Open DMG → drag to Applications → launch |
            | **Linux** | `Lavira-Media-Setup-*.AppImage` | `chmod +x` the file → double-click to run |

            ### On first launch
            A setup wizard opens. Enter your API keys:
            - **Anthropic API key** — required for AI captions ([get one here](https://console.anthropic.com/settings/keys))
            - **Pexels API key** — optional, for stock photo posts ([free at pexels.com/api](https://www.pexels.com/api/))
            - **GIPHY API key** — optional, for GIF posts ([free at developers.giphy.com](https://developers.giphy.com/))

            **No Node.js, no FFmpeg, no terminal needed.** Everything is bundled.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
