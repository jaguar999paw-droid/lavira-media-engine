name: Package Windows ZIP

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    name: Build lavira-media-engine-windows-setup.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows setup ZIP
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY:    ${{ secrets.PEXELS_API_KEY }}
          GIPHY_API_KEY:     ${{ secrets.GIPHY_API_KEY }}
        run: |
          mkdir -p staging

          # ── Core engine files ──────────────────────────────────────────────
          cp docker-compose.yml   staging/
          cp .env.example         staging/
          cp Dockerfile           staging/

          # ── Windows launcher + setup scripts ──────────────────────────────
          cp windows/Install-Lavira.bat          staging/
          cp windows/start.bat                   staging/
          cp windows/setup-remote-access.ps1     staging/
          cp windows/SETUP.md                    staging/
          cp windows/keys.env.example            staging/

          # ── Inject live API keys → keys.env (never stored in git) ─────────
          cat > staging/keys.env << EOF
          ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
          PEXELS_API_KEY=${PEXELS_API_KEY}
          GIPHY_API_KEY=${GIPHY_API_KEY}
          EOF
          # Strip leading whitespace from heredoc
          sed -i 's/^[[:space:]]*//' staging/keys.env

          echo "ZIP contents:"
          ls -lah staging/
          echo "keys.env preview (keys masked):"
          sed 's/=.*/=***/' staging/keys.env

          cd staging
          zip -r ../lavira-media-engine-windows-setup.zip .
          cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-zip
          path: lavira-media-engine-windows-setup.zip
          retention-days: 14

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## 🦁 Lavira Media Engine ${{ github.ref_name }}

            ### ⬇️ Download

            | File | Platform |
            |------|----------|
            | **`lavira-media-engine-windows-setup.zip`** | **Windows 10/11** |
            | `Source code (zip)` | Developers |

            ---

            ### Install — no configuration needed

            1. Extract `lavira-media-engine-windows-setup.zip` anywhere
            2. Double-click **`Install-Lavira.bat`**
            3. Click **Yes** when Windows asks for permission
            4. Wait ~10 minutes — everything installs automatically
            5. Your browser opens to the Lavira studio at **http://localhost:4005**

            > API keys are pre-configured. No Notepad, no prompts.

            **If your computer needs to restart** during install — let it. Lavira starts automatically after the reboot.

            ---

            ### To start Lavira after the first install

            Double-click **`start.bat`** in the extracted folder.

            ---

            ### Remote access (for admin via Tailscale SSH)

            The setup script automatically joins the machine to the Lavira tailnet as `tag:lavira` with SSH enabled. From `dizaster`:
            ```bash
            ssh YOUR_USERNAME@lavira-win-HOSTNAME
            # Update keys any time:
            nano ~/lavira-media-engine/.env
            docker compose -f ~/lavira-media-engine/docker-compose.yml restart
            ```

            ---

            See **`SETUP.md`** inside the ZIP for full details.

            **Docs:** [github.com/jaguar999paw-droid/lavira-media-engine](https://github.com/jaguar999paw-droid/lavira-media-engine)
          files: lavira-media-engine-windows-setup.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
