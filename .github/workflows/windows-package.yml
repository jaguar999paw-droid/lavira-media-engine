name: Package Windows ZIP

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    name: Build lavira-media-engine-windows-setup.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows setup ZIP
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          GIPHY_API_KEY: ${{ secrets.GIPHY_API_KEY }}
          TS_AUTH_KEY: ${{ secrets.TS_AUTH_KEY }}
        run: |
          mkdir -p staging

          # ── Core engine files ──────────────────────────────────────────────
          cp docker-compose.yml   staging/
          cp .env.example         staging/
          cp Dockerfile           staging/

          # ── package.json + lock — required by: npm ci inside Docker build ──
          # Without these, `docker compose up --build` fails at the RUN npm ci step.
          cp package.json         staging/
          cp package-lock.json    staging/

          # ── Application source — required by: COPY src/ in Dockerfile ──────
          # Without src/, the Docker image build errors: "COPY failed: no source files"
          cp -r src/              staging/src/

          # ── Web UI assets — required by: COPY public/ in Dockerfile ─────────
          cp -r public/           staging/public/

          # ── Windows launcher + setup scripts ──────────────────────────────
          cp windows/Install-Lavira.bat          staging/
          cp windows/start.bat                   staging/
          cp windows/setup-remote-access.ps1     staging/
          cp windows/SETUP.md                    staging/
          cp windows/keys.env.example            staging/

          # ── Inject pre-filled keys.env from CI secrets ────────────────────
          # keys.env is gitignored and NEVER committed to the repo.
          # It is written here at build time so the installer is zero-touch.
          # The end user can replace any key later via Tailscale SSH:
          #   nano ~/lavira-media-engine/.env
          #   docker compose restart
          printf 'ANTHROPIC_API_KEY=%s\n' "${ANTHROPIC_API_KEY}" >  staging/keys.env
          printf 'PEXELS_API_KEY=%s\n'    "${PEXELS_API_KEY}"    >> staging/keys.env
          printf 'GIPHY_API_KEY=%s\n'     "${GIPHY_API_KEY}"     >> staging/keys.env
          printf 'TS_AUTH_KEY=%s\n'       "${TS_AUTH_KEY}"       >> staging/keys.env

          # Social publishing tokens — blank by default, filled by user later
          printf 'INSTAGRAM_ACCESS_TOKEN=\n' >> staging/keys.env
          printf 'INSTAGRAM_USER_ID=\n'      >> staging/keys.env
          printf 'FACEBOOK_ACCESS_TOKEN=\n'  >> staging/keys.env
          printf 'FACEBOOK_PAGE_ID=\n'       >> staging/keys.env
          printf 'TIKTOK_ACCESS_TOKEN=\n'    >> staging/keys.env

          echo "── Staging tree ──"
          find staging -not -path '*/node_modules/*' | sort
          echo "── keys.env written (values redacted) ──"
          sed 's/=.*/=***/' staging/keys.env

          cd staging
          zip -r ../lavira-media-engine-windows-setup.zip .
          cd ..

          echo "── ZIP size ──"
          du -sh lavira-media-engine-windows-setup.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-zip
          path: lavira-media-engine-windows-setup.zip
          retention-days: 14

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## Lavira Media Engine ${{ github.ref_name }}

            > AI-powered safari content platform — web studio + 77 Claude MCP tools.

            ---

            ## ⬇️ Which file do I download?

            | You want… | Download this |
            |---|---|
            | **Full setup — MCP + web + remote access** ✅ Recommended | `lavira-media-engine-windows-setup.zip` |
            | Web studio only (no MCP, no Docker) | `Lavira-Media-Setup-*.exe` |
            | macOS | `Lavira-Media-Setup-*.dmg` |
            | Linux | `Lavira-Media-Setup-*.AppImage` or `*.deb` |

            ---

            ## 🪟 Windows — Full Setup (MCP + Web)

            **Requirements:** Windows 10 or 11 (64-bit). Internet connection. ~15 min on first run.

            **Steps:**

            1. Download **`lavira-media-engine-windows-setup.zip`** from the assets below
            2. Right-click the ZIP → **Extract All** → choose any folder (e.g. Desktop)
            3. Open the extracted folder
            4. Double-click **`Install-Lavira.bat`**
            5. Click **Yes** when Windows asks for permission
            6. Leave the window open — it installs everything automatically (~10 min)
            7. If asked to restart, click OK — setup resumes automatically after reboot
            8. When done, your browser opens to **http://localhost:4005** ✅

            > **API keys are pre-loaded.** No Notepad, no prompts, no configuration needed.

            **What gets installed automatically:**
            - Docker Desktop (runs the engine)
            - Claude Desktop (pre-wired to 77 Lavira MCP tools)
            - Tailscale (joins the Lavira network automatically)
            - Lavira engine files
            - Auto-start on login

            > To swap API keys later, SSH in via Tailscale and edit `~/lavira-media-engine/.env`, then run `docker compose restart`.

            ---

            ## 📦 What's inside the ZIP

            The ZIP is a self-contained Docker build context — everything Docker needs to build the image locally:

            ```
            lavira-media-engine-windows-setup.zip
            ├── docker-compose.yml       ← orchestrates the two containers
            ├── Dockerfile               ← builds the engine image
            ├── package.json             ← npm dependencies list
            ├── package-lock.json        ← locked dependency tree (for npm ci)
            ├── src/                     ← application source code
            ├── public/                  ← web UI assets
            ├── .env.example             ← environment variable template
            ├── keys.env                 ← pre-filled API keys (baked in at build time)
            ├── Install-Lavira.bat       ← double-click to install everything
            ├── start.bat                ← use this after reboot to start engine
            ├── setup-remote-access.ps1  ← main install script (called by BAT)
            ├── keys.env.example         ← key template for reference
            └── SETUP.md                 ← setup documentation
            ```

            ---

            ## 🔌 Using Lavira with Claude Desktop (MCP)

            After install, open **Claude Desktop**. You will see Lavira tools available in every conversation — no extra setup needed.

            To verify: open Claude Desktop → start a new chat → type `list my recent jobs`. Claude should respond with Lavira data.

            **MCP server address** (if you need to add it manually):
            ```
            http://localhost:4006/sse
            ```
            Add this under `Settings → Developer → MCP Servers` in Claude Desktop.

            ---

            ## 🌐 Daily use

            | Task | How |
            |---|---|
            | Open web studio | http://localhost:4005 |
            | Start engine (after reboot) | Double-click `start.bat` in the install folder |
            | Stop engine | Open PowerShell → `docker compose down` |
            | Check engine is running | Open PowerShell → `docker compose ps` |

            ---

            ## ❓ Troubleshooting

            | Problem | Fix |
            |---|---|
            | "Windows protected your PC" dialog | Click **More info** → **Run anyway** |
            | UAC prompt doesn't appear | Right-click `Install-Lavira.bat` → **Run as administrator** |
            | Browser says "can't connect" after install | Wait 30 seconds and refresh |
            | Engine stopped after reboot | Double-click `start.bat` |
            | Port 4005 already in use | Open PowerShell: `docker compose down` then `docker compose up -d` |
            | Claude Desktop doesn't show Lavira tools | Restart Claude Desktop |

            ---

            **Support:** info@lavirasafaris.com
            **Docs:** https://github.com/jaguar999paw-droid/lavira-media-engine
          files: lavira-media-engine-windows-setup.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
