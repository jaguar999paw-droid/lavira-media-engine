name: Package Windows ZIP

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    name: Build lavira-media-engine-windows-setup.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows setup ZIP
        run: |
          mkdir -p staging

          # Core engine files
          cp docker-compose.yml       staging/
          cp .env.example             staging/
          cp Dockerfile               staging/

          # Windows helpers (root of ZIP)
          cp windows/start.bat                staging/
          cp windows/SETUP.md                 staging/
          cp windows/setup-remote-access.ps1  staging/

          echo "ZIP contents:"
          ls -lah staging/

          cd staging
          zip -r ../lavira-media-engine-windows-setup.zip .
          cd ..

          echo "Final ZIP:"
          unzip -l lavira-media-engine-windows-setup.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-zip
          path: lavira-media-engine-windows-setup.zip
          retention-days: 14

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## 🦁 Lavira Media Engine ${{ github.ref_name }}

            ### ⬇️ Download

            | File | Platform | Instructions |
            |------|----------|-------------|
            | **`lavira-media-engine-windows-setup.zip`** | **Windows 10/11** | Extract → see below |
            | `Source code (zip)` | All | For developers |

            ---

            ### Option A — Local setup (double-click)

            **1.** Extract the ZIP anywhere (e.g. `C:\LaviraMedia\`).

            **2.** Double-click **`start.bat`** — installs Docker, pulls images, opens studio at **http://localhost:4005**.

            ---

            ### Option B — Remote access setup (managed from dizaster over Tailscale)

            Use **`setup-remote-access.ps1`** to onboard a remote Windows PC so you can SSH into it from `dizaster` and manage Lavira remotely.

            Open PowerShell **as Administrator** on the remote machine and run:
            ```powershell
            Set-ExecutionPolicy Bypass -Scope Process -Force
            .\setup-remote-access.ps1
            ```

            The script will prompt for a Tailscale auth key. Generate a **reusable, tagged key** at:
            https://login.tailscale.com/admin/settings/keys

            > **Security note:** Do not share auth keys publicly. The script accepts the key interactively or via `-TailscaleAuthKey` parameter — it is never stored in the source code.

            What this installs:
            - **Tailscale** — joins tailnet as `lavira-win-<hostname>`, tagged `tag:lavira`, Tailscale SSH enabled (no passwords)
            - **OpenSSH Server** — fallback SSH on port 22, hardened
            - **dizaster pubkey** — `kamau@dizaster` key pre-installed in `authorized_keys`
            - **Docker Desktop** — WSL 2 backend
            - **Claude Desktop** — MCP pre-wired to local engine AND dizaster engine
            - **Firewall rules** — ports 4005 + 4006 opened
            - **Auto-start shortcut** — engine starts on login

            After setup, SSH in from dizaster (no password):
            ```bash
            ssh YOUR_USERNAME@lavira-win-HOSTNAME
            ```
            Then finish:
            ```powershell
            notepad ~/lavira-media-engine/.env   # add ANTHROPIC_API_KEY
            cd ~/lavira-media-engine && .\start.bat
            ```

            #### Script flags
            ```powershell
            .\setup-remote-access.ps1 -DryRun          # preview without changes
            .\setup-remote-access.ps1 -SkipDocker       # skip Docker install
            .\setup-remote-access.ps1 -TailscaleAuthKey "tskey-auth-..."  # non-interactive
            ```

            ---

            ### API Keys needed in `.env`

            | Key | Required? | Get it at |
            |-----|-----------|-----------|
            | **Anthropic** | ✅ Yes | [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) |
            | **Pexels** | Optional | [pexels.com/api](https://www.pexels.com/api/) |
            | **GIPHY** | Optional | [developers.giphy.com](https://developers.giphy.com/) |

            See **`SETUP.md`** for the full guide including Claude Desktop MCP setup and troubleshooting.

            ---

            **Docs:** [github.com/jaguar999paw-droid/lavira-media-engine](https://github.com/jaguar999paw-droid/lavira-media-engine)
          files: lavira-media-engine-windows-setup.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
