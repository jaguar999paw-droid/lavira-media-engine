name: Package Windows ZIP

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package-windows:
    name: Build lavira-media-engine-windows-setup.zip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Windows setup ZIP
        run: |
          mkdir -p staging

          # ── Core engine files ──────────────────────────────────────────────
          cp docker-compose.yml   staging/
          cp .env.example         staging/
          cp Dockerfile           staging/

          # ── Windows launcher + setup scripts ──────────────────────────────
          cp windows/Install-Lavira.bat          staging/
          cp windows/start.bat                   staging/
          cp windows/setup-remote-access.ps1     staging/
          cp windows/SETUP.md                    staging/
          cp windows/keys.env.example            staging/

          echo "ZIP contents:"
          ls -lah staging/

          cd staging
          zip -r ../lavira-media-engine-windows-setup.zip .
          cd ..

          echo "Final ZIP:"
          unzip -l lavira-media-engine-windows-setup.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup-zip
          path: lavira-media-engine-windows-setup.zip
          retention-days: 14

      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          name: "Lavira Media ${{ github.ref_name }}"
          body: |
            ## 🦁 Lavira Media Engine ${{ github.ref_name }}

            ### ⬇️ Download

            | File | Platform |
            |------|----------|
            | **`lavira-media-engine-windows-setup.zip`** | **Windows 10/11** |
            | `Source code (zip)` | Developers |

            ---

            ### Option A — Interactive local install (double-click)

            1. Extract the ZIP anywhere (e.g. `C:\LaviraMedia\`)
            2. Double-click **`Install-Lavira.bat`** — fully automated
               - Installs Docker Desktop, Claude Desktop, Tailscale
               - Downloads the engine
               - Opens settings file once to enter your Anthropic API key
               - Auto-starts the engine and opens your browser

            ---

            ### Option B — Zero-touch deploy (pre-filled keys, no prompts at all)

            For deploying to a machine where you want zero user interaction:

            1. Extract the ZIP
            2. Copy `keys.env.example` → `keys.env` in the same folder
            3. Fill in `ANTHROPIC_API_KEY=sk-ant-...` (and optional keys)
            4. Double-click **`Install-Lavira.bat`** — setup reads keys silently, no Notepad

            ---

            ### Option C — Remote access setup (SSH from dizaster over Tailscale)

            For managing the engine remotely from `kamau@dizaster`:

            Open PowerShell **as Administrator** on the Windows machine and run:
            ```powershell
            Set-ExecutionPolicy Bypass -Scope Process -Force
            .\setup-remote-access.ps1
            ```

            The auth key is pre-baked. This installs and configures:
            - **Tailscale** — joins tailnet as `tag:lavira`, Tailscale SSH enabled
            - **OpenSSH Server** — fallback SSH on port 22
            - **dizaster pubkey** — `kamau@dizaster` pre-authorised in `authorized_keys`
            - **Docker Desktop** + WSL2
            - **Claude Desktop** — MCP wired to local engine AND dizaster engine
            - **Firewall rules** for ports 4005 + 4006
            - **Auto-start shortcut** — engine starts on login

            After setup, SSH in from dizaster:
            ```bash
            ssh YOUR_USERNAME@lavira-win-HOSTNAME
            cd ~/lavira-media-engine && .\start.bat
            ```

            ---

            ### API Keys

            | Key | Required? | Get it at |
            |-----|-----------|-----------|
            | **Anthropic** | ✅ Yes | [console.anthropic.com/settings/keys](https://console.anthropic.com/settings/keys) |
            | **Pexels** | Optional | [pexels.com/api](https://www.pexels.com/api/) |
            | **GIPHY** | Optional | [developers.giphy.com](https://developers.giphy.com/) |

            See **`SETUP.md`** inside the ZIP for the full guide.

            ---

            **Docs:** [github.com/jaguar999paw-droid/lavira-media-engine](https://github.com/jaguar999paw-droid/lavira-media-engine)
          files: lavira-media-engine-windows-setup.zip
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
